name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit (Security Scan)
        run: bandit -r backend/

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Build frontend
        run: cd frontend && npm run build

  cpp-engine-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgrpc++-dev libprotobuf-dev protobuf-compiler-grpc libssl-dev
      - name: Configure and Build
        run: |
          cd cpp-security-engine
          mkdir build && cd build
          cmake ..
          make -j$(nproc)

  trivy-scan:
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy (Filesystem Scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pip-audit bandit
      - name: Audit Python dependencies
        run: pip-audit -r backend/requirements.txt
  docker-stack-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose config --quiet
      - name: Build Stack (Dry Run)
        run: docker compose build
      - name: Check Nginx Config
        run: |
          docker run --rm \
            --add-host frontend:127.0.0.1 \
            --add-host backend:127.0.0.1 \
            -v $(pwd)/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:alpine nginx -t
