<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeroPass | Protocol Update</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono:wght@700&display=swap');
        
        :root {
            --bg: #020617;
            --primary: #ef4444;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .mesh {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(239, 68, 68, 0.05) 0%, transparent 50%);
            z-index: -1;
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .logo span { color: var(--primary); }

        h1 {
            font-weight: 900;
            font-size: 3rem;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        p {
            color: #64748b;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .loader {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 0.6s infinite alternate;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            to { opacity: 0.3; transform: translateY(-10px); }
        }

        .status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="mesh"></div>
    <div class="container">
        <div class="logo">Zero<span>Pass</span></div>
        <div class="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <h1>Protocol Sync</h1>
        <p>We are currently synchronizing global security protocols. This usually takes less than 30 seconds. Your biometrics remain secure.</p>
        <div class="status">Initializing Core Handshake...</div>
    </div>
    <script>
        // Auto-refresh the page every 5 seconds to check if we're back up
        setTimeout(() => {
            window.location.reload();
        }, 5000);
    </script>
</body>
</html>
