# Use DOCKER_BUILDKIT=1 for faster builds
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3005:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3006:3000"
    depends_on:
      - prometheus

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "8005:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/zeropass
      - REDIS_URL=redis://redis:6379/0
      - SECURITY_ENGINE_URL=cpp-engine:50051
    depends_on:
      - db
      - redis
      - cpp-engine

  cpp-engine:
    build:
      context: ./cpp-security-engine
      dockerfile: ../docker/cpp-engine.Dockerfile
    ports:
      - "50051:50051"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=zeropass
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  postgres_data:
